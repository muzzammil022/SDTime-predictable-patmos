version: "3.9"

services:
  # ── FastAPI backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app                # hot-reload during dev
      - /var/run/docker.sock:/var/run/docker.sock   # lets backend talk to Docker
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - executor

  # ── Patmos Toolchain Container ──
  # Contains: patmos-clang, pasim, patemu, gcc
  # Built once (~30-60 min first time), cached after.
  # The backend spawns ephemeral containers from this image.
  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    image: sdtime-executor:latest      # tag so backend can reference it
    entrypoint: ["echo", "executor image ready — patmos-clang + pasim + patemu"]
